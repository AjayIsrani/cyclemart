<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cycle Mart | Review Assistant</title>
<style>
:root{--blue:#0b5ed7;--blue2:#1e88e5;--red:#e53935;--bg:#eef4ff;--text:#243447}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#0b5ed7,#5aa9ff);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{width:100%;max-width:460px;background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.hero{background:linear-gradient(135deg,var(--blue),var(--blue2));padding:36px 20px;color:#fff;text-align:center}
.hero .icon{font-size:58px}.hero h1{margin:8px 0 4px;font-size:34px}.hero p{margin:0;opacity:.95}
.content{padding:22px}
.stars{text-align:center;font-size:28px}
.desc{text-align:center;color:#666;line-height:1.6}
.review{margin:18px 0;background:#f8fbff;border:2px dashed #9fc3ff;border-radius:18px;padding:18px;min-height:120px;line-height:1.7}
button{width:100%;padding:15px;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;transition:.2s}
.primary{border:none;background:var(--red);color:#fff}
.secondary{background:#fff;border:2px solid var(--blue);color:var(--blue)}
.link{display:block;text-align:center;text-decoration:none;color:var(--blue);font-weight:700;margin-top:14px}
.footer{background:#f7f7f7;padding:16px;text-align:center;font-size:13px;color:#666}
.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#111;color:#fff;padding:12px 18px;border-radius:12px;opacity:0;transition:.3s}
.show{opacity:1}
</style>
</head>
<body>
<div class="card">
<div class="hero">
<div class="icon">🚴</div>
<h1>Cycle Mart</h1>
<p>Raiya Road, Near Janta Dairy, Rajkot</p>
</div>
<div class="content">
<div class="stars">⭐⭐⭐⭐⭐</div>
<p class="desc">We generated a unique review. Copy it and we'll open Google Reviews automatically.</p>
<div class="review" id="review"></div>
<button class="primary" onclick="copyReview()">📋 Copy Review & Open Google</button>
<button class="secondary" onclick="generate()">🔄 Generate Another Review</button>
<button class="secondary" onclick="toggleLang()" id="langBtn">🌐 ગુજરાતી</button>
<a class="link" href="https://share.google/V49FhikHkU5WcY2g8" target="_blank">📍 Open Store Location</a>
</div>
<div class="footer"><b>Cycle Mart</b><br>Bicycle • Tricycle • Accessories • Magic Car • Baby Walker<br>Proprietor: Hargovind Israni</div>
</div>
<div id="toast" class="toast">Copied successfully!</div>
<script>
const reviewUrl="https://g.page/r/CccgxB5YC5vJEBE/review";
let gu=false,current="";
const en={o:["Fantastic experience at Cycle Mart.","Best bicycle shop in Rajkot.","Amazing collection of bicycles.","Very happy with my purchase.","Excellent customer service.","Highly recommended showroom.","Value for money experience.","Professional guidance by Hargovind Bhai.","Wonderful shopping experience.","Top-quality products."],b:["Hero and Hercules collections are excellent.","Found the perfect Avon bicycle.","Momstar bikes are perfect for kids.","Brake alignment and gear tuning were completed quickly.","Transparent pricing with honest advice.","Excellent accessories collection.","Magic cars and baby walkers are available.","Friendly staff and quick service.","Premium Harlan bicycles available.","Great after-sales support."],c:["Highly recommended!","Will definitely visit again.","Five stars from me.","Worth every rupee.","Best cycle dealer in Rajkot.","Thank you Hargovind Bhai.","Loved the experience.","Excellent service.","Very trustworthy.","Keep up the great work."]};
const guj={o:["સાયકલ માર્ટમાં ખૂબ સરસ અનુભવ રહ્યો.","રાજકોટનું શ્રેષ્ઠ સાયકલ શોરૂમ.","ખૂબ ખુશ છું.","અદ્ભુત સેવા મળી.","ખૂબ સંતોષ થયો."],b:["હીરો અને હરક્યુલિસનો ઉત્તમ સ્ટોક છે.","એવન સાયકલ ખૂબ ગમી.","મોમસ્ટાર બાળકો માટે સરસ છે.","ગિયર અને બ્રેક ઝડપથી સેટ કર્યા.","સ્ટાફ ખૂબ મદદરૂપ છે."],c:["ફરી જરૂર આવીશ.","બધાને ભલામણ કરું છું.","૫ સ્ટાર લાયક છે.","આભાર હરગોવિંદ ભાઈ.","ખૂબ સરસ સેવા."]};
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function generate(){let d=gu?guj:en;current=pick(d.o)+" "+pick(d.b)+" "+pick(d.c);review.textContent=current;}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1700);}
function copyReview(){navigator.clipboard.writeText(current).then(()=>{toast(gu?"કોપી થઈ ગયું":"Copied! Opening Google...");setTimeout(()=>location.href=reviewUrl,900)}).catch(()=>location.href=reviewUrl);}
function toggleLang(){gu=!gu;document.getElementById('langBtn').textContent=gu?"🌐 English":"🌐 ગુજરાતી";generate();}
generate();
</script>
</body>
</html>
